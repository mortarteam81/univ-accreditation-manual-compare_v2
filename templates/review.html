<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>검토 인터페이스 — 인증평가 편람 비교분석</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/review.css">
</head>
<body>
<div class="app-container">

  <!-- HEADER -->
  <header class="app-header animate-in">
    <div class="header-left">
      <a href="/" class="back-link" title="대시보드로 돌아가기">← 대시보드</a>
      <div class="header-icon">✏️</div>
      <div>
        <h1 class="header-title">항목별 비교 검토</h1>
        <p class="header-subtitle" id="page-subtitle">준거를 선택하세요</p>
      </div>
    </div>
    <div class="header-right">
      <span class="header-badge badge-live" id="review-count">0건</span>
    </div>
  </header>

  <!-- FILTER BAR -->
  <div class="filter-bar animate-in" id="filter-bar">
    <div class="filter-group filter-search">
      <label>검색</label>
      <input id="f-q" type="search" placeholder="항목 ID, 원문, 부서, 검토사유">
    </div>
    <div class="filter-group">
      <label>준거</label>
      <select id="f-criterion"><option value="">전체</option></select>
    </div>
    <div class="filter-group">
      <label>섹션</label>
      <select id="f-section">
        <option value="">전체</option>
        <option value="overview">개요</option>
        <option value="report">보고서</option>
        <option value="evidence">근거자료</option>
        <option value="checkpoints">점검사항</option>
        <option value="notes">유의사항</option>
      </select>
    </div>
    <div class="filter-group">
      <label>변경유형</label>
      <select id="f-type">
        <option value="">전체</option>
        <option value="유지">유지</option>
        <option value="변경">변경</option>
        <option value="신설후보">신설후보</option>
        <option value="삭제후보">삭제후보</option>
        <option value="삭제/이동후보">삭제/이동후보</option>
        <option value="이동후보">이동후보</option>
      </select>
    </div>
    <div class="filter-group">
      <label>정렬</label>
      <select id="f-sort">
        <option value="priority">검토 우선순위</option>
        <option value="high_risk">고위험 우선</option>
        <option value="candidate">후보 우선</option>
        <option value="status">상태별 묶기</option>
        <option value="similarity_low">유사도 낮은 순</option>
        <option value="criterion">준거순</option>
      </select>
    </div>
    <label class="filter-toggle">
      <input type="checkbox" id="f-note">
      <span>메모 있음</span>
    </label>
    <button class="btn-filter" onclick="loadChanges()">🔍 조회</button>
    <div class="status-filter-group" aria-label="검증상태 필터">
      <span class="status-filter-label">상태</span>
      <div class="status-menu" id="status-menu"></div>
    </div>
  </div>

  <!-- CHANGE LIST -->
  <div id="change-list" class="change-list">
    <div class="loading"><div class="spinner"></div>준거를 선택한 후 조회 버튼을 누르세요</div>
  </div>

</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-content" id="modal-content" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="modal-body">
      <div class="loading"><div class="spinner"></div>로딩 중...</div>
    </div>
  </div>
</div>

<script>
const API = path => fetch(path).then(r => r.json());
const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
const canManageReview = {{ 'true' if current_user() and current_user().role == 'admin' else 'false' }};
const DIFF_TOKEN_LIMIT = 260;
const STATUS_OPTIONS = [
  {value: '', label: '전체'},
  {value: 'needs_review', label: '검토필요'},
  {value: 'candidate', label: '후보'},
  {value: 'confirmed', label: '확정'},
  {value: 'rejected', label: '반려'},
  {value: 'deferred', label: '보류'}
];
let activeStatus = '';

// ── Init: load criteria list ──
async function init() {
  const params = new URLSearchParams(location.search);
  const crit = params.get('criterion') || '';
  const sec = params.get('section') || '';
  const status = params.get('status') || '';
  const sort = params.get('sort') || 'priority';
  const q = params.get('q') || '';
  const hasNote = params.get('has_note') === '1';

  const list = await API('/api/criteria-list');
  const sel = document.getElementById('f-criterion');
  list.forEach(c => {
    const o = document.createElement('option');
    o.value = c.cycle4_criterion;
    o.textContent = `${c.cycle4_criterion} ${c.cycle4_title}`;
    if (c.cycle4_criterion === crit) o.selected = true;
    sel.appendChild(o);
  });
  if (sec) document.getElementById('f-section').value = sec;
  if (STATUS_OPTIONS.some(opt => opt.value === status)) activeStatus = status;
  if (document.querySelector(`#f-sort option[value="${sort}"]`)) document.getElementById('f-sort').value = sort;
  document.getElementById('f-q').value = q;
  document.getElementById('f-note').checked = hasNote;
  renderStatusMenu();
  wireFilters();
  loadChanges();
}

function wireFilters() {
  ['f-criterion', 'f-section', 'f-type', 'f-sort', 'f-note'].forEach(id => {
    document.getElementById(id).addEventListener('change', loadChanges);
  });
  document.getElementById('f-q').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadChanges();
  });
}

function buildChangeQuery(includeStatus=true) {
  const c = document.getElementById('f-criterion').value;
  const s = document.getElementById('f-section').value;
  const t = document.getElementById('f-type').value;
  const sort = document.getElementById('f-sort').value;
  const qText = document.getElementById('f-q').value.trim();
  const hasNote = document.getElementById('f-note').checked;

  const q = new URLSearchParams();
  if (c) q.set('criterion', c);
  if (s) q.set('section', s);
  if (t) q.set('change_type', t);
  if (qText) q.set('q', qText);
  if (hasNote) q.set('has_note', '1');
  if (includeStatus && activeStatus) q.set('status', activeStatus);
  if (includeStatus && sort) q.set('sort', sort);
  return q;
}

function renderStatusMenu(counts={}) {
  const total = STATUS_OPTIONS.slice(1).reduce((sum, opt) => sum + Number(counts[opt.value] || 0), 0);
  const menu = document.getElementById('status-menu');
  menu.innerHTML = STATUS_OPTIONS.map(opt => {
    const count = opt.value ? Number(counts[opt.value] || 0) : total;
    const active = opt.value === activeStatus ? ' active' : '';
    return `<button type="button" class="status-chip${active}" data-status="${opt.value}" onclick="setStatusFilter('${opt.value}')">
      <span>${opt.label}</span><strong>${count}</strong>
    </button>`;
  }).join('');
}

async function loadStatusSummary() {
  const counts = await API(`/api/change-status-summary?${buildChangeQuery(false)}`);
  renderStatusMenu(counts);
}

function setStatusFilter(status) {
  activeStatus = status;
  loadChanges();
}

// ── Load changes ──
async function loadChanges() {
  const container = document.getElementById('change-list');
  container.innerHTML = '<div class="loading"><div class="spinner"></div>로딩 중...</div>';

  await loadStatusSummary();
  const q = buildChangeQuery(true);
  const data = await API(`/api/changes?${q}`);
  document.getElementById('review-count').textContent = `${data.length}건`;

  const selOpt = document.getElementById('f-criterion');
  const label = selOpt.options[selOpt.selectedIndex]?.textContent || '전체';
  const statusLabel = STATUS_OPTIONS.find(opt => opt.value === activeStatus)?.label || '전체';
  const sortLabel = document.getElementById('f-sort').selectedOptions[0]?.textContent || '준거순';
  document.getElementById('page-subtitle').textContent = `${label} · ${statusLabel} · ${sortLabel} — ${data.length}건`;

  if (!data.length) {
    container.innerHTML = '<div class="empty-state">조건에 맞는 변경사항이 없습니다.</div>';
    return;
  }

  container.innerHTML = data.map((d, i) => renderRow(d, i)).join('');
}

function changeTypeCls(t) {
  const m = {'유지':'maintained','변경':'changed','신설후보':'new','삭제후보':'deleted','삭제/이동후보':'deleted','이동후보':'moved'};
  return m[t] || 'changed';
}

function statusBadge(s) {
  const m = {confirmed:['확정','badge-confirmed'], needs_review:['검토필요','badge-needs-review'],
    candidate:['후보','badge-candidate'], rejected:['반려','badge-rejected'], deferred:['보류','badge-deferred']};
  const [l, c] = m[s] || [s, 'badge-candidate'];
  return `<span class="status-badge ${c}">${l}</span>`;
}

function riskBadge(d) {
  const rank = Number(d.risk_rank || 0);
  if (rank >= 3) return `<span class="risk-mini risk-high">고위험 ${Number(d.high_risk_count || 0)}</span>`;
  if (rank >= 2) return `<span class="risk-mini risk-medium">중위험 ${Number(d.medium_risk_count || 0)}</span>`;
  return '';
}

function deptBadge(d) {
  if (!d.primary_departments) return '';
  const label = d.primary_departments.split(',').slice(0, 2).join(', ');
  return `<span class="dept-mini" title="${d.primary_departments.replace(/"/g,'&quot;')}">${label}</span>`;
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function escapeAttr(value) {
  return escapeHtml(value).replaceAll('\n', ' ');
}

function simColor(v) {
  if (!v && v !== 0) return '';
  const n = parseFloat(v);
  if (n >= 0.8) return 'sim-high';
  if (n >= 0.5) return 'sim-mid';
  return 'sim-low';
}

function truncate(s, n=80) {
  if (!s) return '<span class="text-empty">—</span>';
  const text = s.length > n ? s.slice(0, n) + '…' : s;
  return escapeHtml(text);
}

function compositeDirectionLabel(direction) {
  const labels = {
    many_to_one: '통합/재구성 후보',
    one_to_many: '분리/재배치 후보',
    many_to_many: '복수 준거 재구성 후보'
  };
  return labels[direction] || '복합 매칭 후보';
}

function compositeStatusLabel(status) {
  const labels = {
    candidate: ['후보', 'candidate'],
    approved: ['승인', 'approved'],
    rejected: ['반려', 'rejected'],
    needs_review: ['재검토', 'needs-review']
  };
  const [label, cls] = labels[status || 'candidate'] || labels.candidate;
  return `<span class="composite-status ${cls}">${label}</span>`;
}

function compositeSourceList(sources) {
  if (!sources || !sources.length) return '<span class="composite-empty">원문 없음</span>';
  return sources.map(s => `
    <div class="composite-source">
      <div class="composite-source-title">${escapeHtml(s.cycle || '')}주기 ${escapeHtml(s.criterion || '')} ${escapeHtml(s.title || '')}</div>
      <div class="composite-source-meta">${escapeHtml(s.source_id || '')}</div>
      <div class="composite-source-preview">${escapeHtml(s.content_preview || '')}</div>
    </div>
  `).join('');
}

function matchCandidateConflictHtml(candidate) {
  const conflicts = candidate.conflict_changes || [];
  if (!conflicts.length) {
    return '<div class="match-conflict clear">충돌 항목 없음</div>';
  }
  return `<div class="match-conflict">
    <strong>충돌 가능 항목</strong>
    ${conflicts.map(item => `<div class="match-conflict-item">
      <span>${escapeHtml(item.change_id || '')}</span>
      <span>${escapeHtml(item.verification_status || '')}</span>
      <span>${escapeHtml(item.source_id_3 || '')} ↔ ${escapeHtml(item.source_id_4 || '')}</span>
    </div>`).join('')}
  </div>`;
}

function matchCandidateActions(candidate, changeId) {
  if (!canManageReview) return '';
  const status = candidate.review_status || 'candidate';
  const isApproved = status === 'approved';
  const isMappingApplied = Boolean(candidate.mapping_applied_at);
  const isPromoted = Boolean(candidate.promoted_composite_id);
  return `<div class="match-actions">
    <button class="btn-match approve" onclick="setMatchCandidateStatus('${candidate.match_id}', 'approved', '${changeId}')">후보 승인</button>
    <button class="btn-match reject" onclick="setMatchCandidateStatus('${candidate.match_id}', 'rejected', '${changeId}')">반려</button>
    <button class="btn-match review" onclick="setMatchCandidateStatus('${candidate.match_id}', 'needs_review', '${changeId}')">재검토</button>
    <button class="btn-match apply" onclick="applyMatchCandidate('${candidate.match_id}', '${changeId}')" ${isApproved && !isMappingApplied ? '' : 'disabled'}>${isMappingApplied ? '매칭 적용 완료' : '실제 매칭 적용'}</button>
    <button class="btn-match promote" onclick="promoteMatchCandidate('${candidate.match_id}', '${changeId}')" ${isPromoted ? 'disabled' : ''}>${isPromoted ? '복합 승격 완료' : '복합 후보 승격'}</button>
  </div>`;
}

function assignmentTypeLabel(type) {
  const labels = {
    primary: ['주 귀속', 'primary'],
    shared_evidence: ['공통 근거', 'shared'],
    moved_or_split_candidate: ['이동/분할 후보', 'split'],
    secondary: ['보조 연결', 'secondary']
  };
  return labels[type || 'primary'] || labels.primary;
}

function assignmentBreakdownHtml(items) {
  if (!items || !items.length) return '';
  return `<div class="assignment-breakdown">
    <div class="assignment-title">항목별 귀속 판단</div>
    <div class="assignment-list">
      ${items.map(item => {
        const [label, cls] = assignmentTypeLabel(item.assignment_type);
        const tags = (item.concept_tags || []).map(tag => `<span>${escapeHtml(tag)}</span>`).join('');
        return `<div class="assignment-item">
          <div class="assignment-head">
            <span class="assignment-badge ${cls}">${label}</span>
            <span class="assignment-source">${escapeHtml(item.source_label || item.source_id || '')}</span>
          </div>
          <div class="assignment-target">
            <strong>주 귀속</strong> ${escapeHtml(item.primary_target || '미정')}
            ${item.secondary_target ? `<span><strong>보조 연결</strong> ${escapeHtml(item.secondary_target)}</span>` : ''}
          </div>
          ${tags ? `<div class="assignment-tags">${tags}</div>` : ''}
          <div class="assignment-reason">${escapeHtml(item.assignment_reason || '')}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function tokenizeDiffText(value) {
  return String(value || '').match(/\s+|[가-힣]+|[A-Za-z0-9]+|[^\s가-힣A-Za-z0-9]/g) || [];
}

function buildDiffOps(left, right) {
  const a = tokenizeDiffText(left);
  const b = tokenizeDiffText(right);
  if (a.length + b.length > DIFF_TOKEN_LIMIT) {
    return null;
  }

  const rows = a.length + 1;
  const cols = b.length + 1;
  const dp = Array.from({ length: rows }, () => Array(cols).fill(0));
  for (let i = a.length - 1; i >= 0; i--) {
    for (let j = b.length - 1; j >= 0; j--) {
      dp[i][j] = a[i] === b[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
    }
  }

  const ops = [];
  let i = 0;
  let j = 0;
  while (i < a.length && j < b.length) {
    if (a[i] === b[j]) {
      ops.push(['same', a[i]]);
      i++;
      j++;
    } else if (dp[i + 1][j] >= dp[i][j + 1]) {
      ops.push(['del', a[i]]);
      i++;
    } else {
      ops.push(['add', b[j]]);
      j++;
    }
  }
  while (i < a.length) ops.push(['del', a[i++]]);
  while (j < b.length) ops.push(['add', b[j++]]);
  return ops;
}

function compactDiffSpans(parts) {
  const compacted = [];
  parts.forEach(part => {
    if (!part[1]) return;
    const last = compacted[compacted.length - 1];
    if (last && last[0] === part[0]) {
      last[1] += part[1];
    } else {
      compacted.push([part[0], part[1]]);
    }
  });
  return compacted.map(([kind, text]) => {
    const cls = kind === 'same' ? 'diff-same' : kind === 'del' ? 'diff-del' : 'diff-add';
    return `<span class="${cls}">${escapeHtml(text)}</span>`;
  }).join('');
}

function diffHtmlForSide(left, right, side, similarity) {
  if (!left && !right) return '<span class="text-empty">—</span>';
  if (!left && side === 'right') return `<span class="diff-add">${escapeHtml(right)}</span>`;
  if (!right && side === 'left') return `<span class="diff-del">${escapeHtml(left)}</span>`;
  if (!left) return '<span class="text-empty">해당 항목 없음 (신설 항목)</span>';
  if (!right) return '<span class="text-empty">해당 항목 없음 (삭제/이동 항목)</span>';

  const ops = buildDiffOps(left, right);
  if (!ops) {
    return `<span class="diff-too-large">원문이 길어 차이 강조를 생략했습니다.</span>${escapeHtml(side === 'left' ? left : right)}`;
  }

  const shown = ops
    .filter(([kind]) => side === 'left' ? kind !== 'add' : kind !== 'del')
    .map(([kind, text]) => {
      if (side === 'left' && kind === 'del') return ['del', text];
      if (side === 'right' && kind === 'add') return ['add', text];
      return ['same', text];
    });
  const html = compactDiffSpans(shown);
  const lowSim = Number(similarity || 0) > 0 && Number(similarity || 0) < 0.45
    ? '<span class="diff-too-large">유사도가 낮아 전체 재검토가 필요합니다.</span>'
    : '';
  return lowSim + html;
}

function renderRow(d, i) {
  const sim = d.similarity ? `${(d.similarity * 100).toFixed(0)}%` : '—';
  const noteCount = Number(d.note_count || 0);
  return `
  <div class="change-row animate-in${noteCount > 0 ? ' has-note' : ''}" style="animation-delay:${i*0.02}s" onclick="openDetail('${d.change_id}')">
    <div class="row-left">
      <span class="change-id">${d.change_id}</span>
      <span class="change-type-tag tag-${changeTypeCls(d.change_type)}">${d.change_type}</span>
      <span class="section-tag">${d.section_type}</span>
      ${statusBadge(d.verification_status)}
      ${riskBadge(d)}
      ${deptBadge(d)}
      ${noteCount > 0 ? `<span class="note-badge">메모 ${noteCount}</span>` : ''}
    </div>
    <div class="row-texts">
      <div class="row-text-3" title="${escapeAttr(d.source_text_3 || '')}">${truncate(d.source_text_3, 90)}</div>
      <span class="row-arrow ${simColor(d.similarity)}">${sim}</span>
      <div class="row-text-4" title="${escapeAttr(d.source_text_4 || '')}">${truncate(d.source_text_4, 90)}</div>
    </div>
  </div>`;
}

// ── Detail Modal ──
async function openDetail(changeId) {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-body').innerHTML = '<div class="loading"><div class="spinner"></div>로딩 중...</div>';

  const [detail, history, allDepts, assignedDepts] = await Promise.all([
    API(`/api/change/${changeId}`),
    API(`/api/change/${changeId}/history`),
    API('/api/departments'),
    API(`/api/change/${changeId}/departments`)
  ]);

  const c = detail.change;
  const mc = detail.match_candidates || [];
  const compositeCandidates = detail.composite_candidates || [];
  const acts = detail.department_actions || [];
  const sim = c.similarity ? `${(c.similarity*100).toFixed(0)}%` : '—';

  let matchHtml = '';
  if (mc.length) {
    matchHtml = `<div class="detail-section"><h4>🔍 AI 매칭 후보 (상위 ${mc.length}건)</h4><div class="match-list">` +
      mc.map(m => `<div class="match-item match-card">
        <div class="match-head">
          <span class="match-rank">#${m.rank}</span>
          <span class="match-score ${simColor(m.score)}">${(m.score*100).toFixed(0)}%</span>
          ${compositeStatusLabel(m.review_status)}
          ${m.applied_at ? `<span class="match-applied">검토 등록 ${escapeHtml(m.applied_at.slice(0,16).replace('T',' '))}</span>` : ''}
          ${m.mapping_applied_at ? `<span class="match-applied">매칭 적용 ${escapeHtml(m.mapping_applied_at.slice(0,16).replace('T',' '))}</span>` : ''}
          ${m.promoted_composite_id ? `<span class="match-promoted">복합 ${escapeHtml(m.promoted_composite_id)}</span>` : ''}
        </div>
        <div class="match-candidate-grid">
          <div>
            <div class="match-grid-label">기준 원문</div>
            <div class="match-id">${escapeHtml(m.query_source_id || '')}</div>
            <div class="match-text">${truncate(m.query_text, 150)}</div>
          </div>
          <div>
            <div class="match-grid-label">AI 후보</div>
            <div class="match-id">${escapeHtml(m.candidate_source_id || '')}</div>
            <div class="match-text">${truncate(m.candidate_text, 150)}</div>
          </div>
        </div>
        <div class="match-reason">${escapeHtml(m.match_reason || '')}</div>
        ${matchCandidateConflictHtml(m)}
        ${m.decision_note ? `<div class="composite-note">검토 메모: ${escapeHtml(m.decision_note)}</div>` : ''}
        ${matchCandidateActions(m, c.change_id)}
      </div>`).join('') + '</div></div>';
  }

  let compositeHtml = '';
  if (compositeCandidates.length) {
    compositeHtml = `<div class="detail-section composite-section"><h4>🧩 복합 매칭 후보</h4><div class="composite-list">` +
      compositeCandidates.map(cc => {
        const score = cc.score ? `${(cc.score * 100).toFixed(0)}%` : '—';
        const coverage = cc.coverage_score ? `${(cc.coverage_score * 100).toFixed(0)}%` : '—';
        const isApproved = cc.review_status === 'approved';
        const isApplied = Boolean(cc.applied_at);
        return `<div class="composite-card">
          <div class="composite-card-head">
            <span class="composite-type">${compositeDirectionLabel(cc.direction)}</span>
            ${compositeStatusLabel(cc.review_status)}
            <span class="composite-score">종합 ${score}</span>
            <span class="composite-score">커버 ${coverage}</span>
            ${cc.applied_at ? `<span class="composite-applied">반영됨 ${escapeHtml(cc.applied_at.slice(0,16).replace('T',' '))}</span>` : ''}
          </div>
          <div class="composite-grid">
            <div>
              <div class="composite-grid-label">기준 원문</div>
              ${compositeSourceList(cc.query_sources)}
            </div>
            <div>
              <div class="composite-grid-label">복합 대응 후보</div>
              ${compositeSourceList(cc.candidate_sources)}
            </div>
          </div>
          <div class="composite-reason">${escapeHtml(cc.evidence_reason || '')}</div>
          ${assignmentBreakdownHtml(cc.assignment_breakdown)}
          ${cc.decision_note ? `<div class="composite-note">검토 메모: ${escapeHtml(cc.decision_note)}</div>` : ''}
          ${canManageReview ? `
          <div class="composite-actions">
            <button class="btn-composite approve" onclick="setCompositeStatus('${cc.composite_id}', 'approved', '${c.change_id}')">승인</button>
            <button class="btn-composite reject" onclick="setCompositeStatus('${cc.composite_id}', 'rejected', '${c.change_id}')">반려</button>
            <button class="btn-composite review" onclick="setCompositeStatus('${cc.composite_id}', 'needs_review', '${c.change_id}')">재검토</button>
            <button class="btn-composite apply" onclick="applyComposite('${cc.composite_id}', '${c.change_id}')" ${isApproved && !isApplied ? '' : 'disabled'}>${isApplied ? '반영 완료' : '관련 항목 반영'}</button>
          </div>
          ` : ''}
          <div class="composite-id">${escapeHtml(cc.composite_id || '')}</div>
        </div>`;
      }).join('') + '</div></div>';
  }

  let actHtml = '';
  if (acts.length) {
    actHtml = `<div class="detail-section"><h4>🏢 부서 조치사항</h4>` +
      acts.map(a => `<div class="action-item">
        <span class="dept-tag">${a.primary_department || '미지정'}</span>
        <span class="risk-tag risk-${a.risk_level}">${a.risk_level}</span>
        <span>${truncate(a.preparation_task, 150)}</span>
      </div>`).join('') + '</div>';
  }

  let historyHtml = '';
  if (history.length) {
    historyHtml = `<div class="detail-section"><h4>📜 검토 이력</h4><div class="history-list">` +
      history.map(h => {
        const actor = h.actor_email || h.reviewer || 'user';
        const actionLabel = h.action === 'status_change' ? `${h.old_status} → ${h.new_status}` : (h.action === 'department_note' ? '부서 의견' : (h.action === 'composite_match' ? '복합 매칭' : (h.action === 'ai_match_candidate' ? 'AI 후보' : '메모')));
        return `<div class="history-item">
        <span class="history-time">${h.created_at?.slice(0,16).replace('T',' ')}</span>
        <span class="history-action">${actionLabel}</span>
        <span class="history-actor">${actor}</span>
        ${h.note ? `<span class="history-note">${h.note}</span>` : ''}
      </div>`;
      }).join('') + '</div></div>';
  }

  document.getElementById('modal-body').innerHTML = `
    <div class="detail-header">
      <div class="detail-meta">
        <span class="change-id">${c.change_id}</span>
        <span class="change-type-tag tag-${changeTypeCls(c.change_type)}">${c.change_type}</span>
        <span class="section-tag">${c.section_type}</span>
        ${statusBadge(c.verification_status)}
        <span class="detail-criterion">${c.cycle4_criterion} ${c.cycle4_title}</span>
      </div>
    </div>

    <div class="compare-container">
      <div class="compare-col compare-3">
        <div class="compare-label">3주기 <span class="compare-criterion">${c.cycle3_criterion || '—'} ${c.cycle3_title || ''}</span></div>
        <div class="compare-text diff-text">${diffHtmlForSide(c.source_text_3, c.source_text_4, 'left', c.similarity)}</div>
        <div class="compare-id">${c.source_id_3 || ''}</div>
      </div>
      <div class="compare-arrow">
        <div class="arrow-sim ${simColor(c.similarity)}">유사도<br><strong>${sim}</strong></div>
        <div class="arrow-icon">→</div>
      </div>
      <div class="compare-col compare-4">
        <div class="compare-label">4주기 <span class="compare-criterion">${c.cycle4_criterion} ${c.cycle4_title}</span></div>
        <div class="compare-text diff-text">${diffHtmlForSide(c.source_text_3, c.source_text_4, 'right', c.similarity)}</div>
        <div class="compare-id">${c.source_id_4 || ''}</div>
      </div>
    </div>

    ${matchHtml}
    ${compositeHtml}
    ${actHtml}

    ${canManageReview ? `
    <div class="detail-section">
      <h4>🏢 담당부서 배정 <span style="font-size:0.75rem;color:var(--text-muted);font-weight:400">(복수 선택 가능)</span></h4>
      <div class="dept-checkboxes" id="dept-cb-${c.change_id}">
        ${allDepts.map(d => {
          const checked = assignedDepts.some(a => a.dept_id === d.dept_id) ? 'checked' : '';
          return `<label class="dept-cb-label"><input type="checkbox" value="${d.dept_id}" ${checked}><span class="dept-cb-name">${d.dept_name}</span><span class="dept-cb-cat">${d.category}</span></label>`;
        }).join('')}
      </div>
      <button class="btn-note" style="margin-top:8px" onclick="saveDepts('${c.change_id}')">💾 부서 배정 저장</button>
    </div>
    ` : ''}

    <div class="detail-section">
      <h4>${canManageReview ? '✏️ 검토 액션' : '💬 부서 의견'}</h4>
      ${canManageReview ? `
      <div class="review-actions" id="review-actions-${c.change_id}">
        <button class="btn-action btn-confirm" onclick="setStatus('${c.change_id}','confirmed')">✅ 확정</button>
        <button class="btn-action btn-reject" onclick="setStatus('${c.change_id}','rejected')">❌ 반려</button>
        <button class="btn-action btn-defer" onclick="setStatus('${c.change_id}','deferred')">⏸ 보류</button>
        <button class="btn-action btn-reset" onclick="setStatus('${c.change_id}','needs_review')">🔄 검토필요로 복원</button>
      </div>
      ` : ''}
      <div class="note-input-group">
        <textarea id="note-input-${c.change_id}" placeholder="${canManageReview ? '검토 메모를 입력하세요...' : '부서 의견이나 확인 내용을 입력하세요...'}" rows="2"></textarea>
        <button class="btn-note" onclick="addNote('${c.change_id}')">💬 메모 저장</button>
      </div>
    </div>

    ${historyHtml}
  `;
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  if (!e) document.getElementById('modal-overlay').classList.remove('open');
}

// ── Review Actions ──
async function setStatus(changeId, status) {
  const noteEl = document.getElementById(`note-input-${changeId}`);
  const note = noteEl ? noteEl.value.trim() : '';

  const res = await fetch(`/api/change/${changeId}/status`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken},
    body: JSON.stringify({status, note})
  });
  const d = await res.json();
  if (d.ok) {
    showToast(`${changeId}: ${status} 처리 완료`);
    openDetail(changeId);  // refresh detail
    loadChanges();          // refresh list
  } else {
    showToast(`오류: ${d.error}`, true);
  }
}

async function addNote(changeId) {
  const noteEl = document.getElementById(`note-input-${changeId}`);
  const note = noteEl.value.trim();
  if (!note) return showToast('메모를 입력하세요', true);

  const res = await fetch(`/api/change/${changeId}/note`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken},
    body: JSON.stringify({note})
  });
  const d = await res.json();
  if (d.ok) {
    noteEl.value = '';
    showToast('메모 저장 완료');
    openDetail(changeId);
    loadChanges();
  }
}

async function setMatchCandidateStatus(matchId, reviewStatus, changeId) {
  const notes = {
    approved: 'AI 매칭 후보를 교체 검토 대상으로 승인합니다.',
    rejected: 'AI 매칭 후보를 현재 검토 기준에서 반려합니다.',
    needs_review: 'AI 매칭 후보는 추가 확인이 필요합니다.',
    candidate: 'AI 매칭 후보 상태로 되돌립니다.'
  };
  const res = await fetch(`/api/match-candidate/${matchId}/review`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken},
    body: JSON.stringify({
      review_status: reviewStatus,
      note: notes[reviewStatus] || ''
    })
  });
  const d = await res.json();
  if (d.ok) {
    showToast('AI 후보 검토 상태 저장 완료');
    openDetail(changeId);
  } else {
    showToast(`오류: ${d.error}`, true);
  }
}

async function applyMatchCandidate(matchId, changeId) {
  const res = await fetch(`/api/match-candidate/${matchId}/apply`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken},
    body: JSON.stringify({
      note: 'AI 매칭 후보 승인 결과를 실제 비교쌍에 반영합니다.'
    })
  });
  const d = await res.json();
  if (d.ok) {
    const message = d.already_applied
      ? '이미 실제 매칭에 적용된 AI 후보입니다'
      : `AI 후보 실제 매칭 적용 완료 · 조정 ${d.changed.length}건`;
    showToast(message);
    openDetail(changeId);
    loadChanges();
  } else {
    showToast(`오류: ${d.error}`, true);
  }
}

async function promoteMatchCandidate(matchId, changeId) {
  const res = await fetch(`/api/match-candidate/${matchId}/promote-composite`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken},
    body: JSON.stringify({
      note: 'AI 1:1 후보와 충돌 항목을 복합 매칭 후보로 승격합니다.'
    })
  });
  const d = await res.json();
  if (d.ok) {
    const message = d.already_promoted
      ? '이미 복합 후보로 승격된 항목입니다'
      : `복합 후보 승격 완료 · ${d.composite_id}`;
    showToast(message);
    openDetail(changeId);
  } else {
    showToast(`오류: ${d.error}`, true);
  }
}

async function setCompositeStatus(compositeId, reviewStatus, changeId) {
  const notes = {
    approved: '복합 매칭 후보를 2차 검수 대상으로 승인합니다.',
    rejected: '복합 매칭 후보를 현재 검토 기준에서 반려합니다.',
    needs_review: '복합 매칭 후보는 추가 확인이 필요합니다.',
    candidate: '복합 매칭 후보 상태로 되돌립니다.'
  };
  const res = await fetch(`/api/composite/${compositeId}/review`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken},
    body: JSON.stringify({
      review_status: reviewStatus,
      note: notes[reviewStatus] || ''
    })
  });
  const d = await res.json();
  if (d.ok) {
    showToast('복합 후보 검토 상태 저장 완료');
    openDetail(changeId);
  } else {
    showToast(`오류: ${d.error}`, true);
  }
}

async function applyComposite(compositeId, changeId) {
  const res = await fetch(`/api/composite/${compositeId}/apply`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken},
    body: JSON.stringify({
      note: '복합 매칭 승인 결과를 관련 항목 검토 큐와 업무 메모에 반영합니다.'
    })
  });
  const d = await res.json();
  if (d.ok) {
    const message = d.already_applied
      ? '이미 반영된 복합 후보입니다'
      : `복합 후보 반영 완료 · 상태변경 ${d.changed.length}건`;
    showToast(message);
    openDetail(changeId);
    loadChanges();
  } else {
    showToast(`오류: ${d.error}`, true);
  }
}

async function saveDepts(changeId) {
  const container = document.getElementById(`dept-cb-${changeId}`);
  const checked = [...container.querySelectorAll('input:checked')].map(cb => parseInt(cb.value));
  const res = await fetch(`/api/change/${changeId}/departments`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken},
    body: JSON.stringify({dept_ids: checked})
  });
  const d = await res.json();
  if (d.ok) showToast(`${d.count}개 부서 배정 완료`);
}

function showToast(msg, isError=false) {
  const t = document.createElement('div');
  t.className = `toast ${isError ? 'toast-error' : 'toast-success'}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.addEventListener('DOMContentLoaded', init);
</script>
