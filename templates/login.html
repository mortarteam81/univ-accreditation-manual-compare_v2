<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — 대학기관평가인증 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/submissions.css">
</head>
<body>
<div class="login-shell">
  <section class="login-panel animate-in">
    <div class="login-mark">✓</div>
    <h1>대학기관평가인증 관리</h1>
    <p>Google 계정으로 로그인한 뒤 편람 비교와 증빙 제출 기능을 사용할 수 있습니다.</p>
    {% if error %}
      <div class="login-error">{{ error }}</div>
    {% endif %}
    {% if oauth_configured and authlib_installed %}
      <a class="login-button login-oauth" href="/auth/oidc/start?next={{ next_url | urlencode }}">Google로 로그인</a>
    {% else %}
      <div class="login-error">OIDC 설정이 아직 완료되지 않았습니다. 환경변수와 Authlib 설치 상태를 확인하세요.</div>
    {% endif %}

    {% if dev_auth_enabled %}
      <div class="login-divider"><span>개발용 fallback</span></div>
      <form method="post" class="login-form">
        <label>
          <span>이메일</span>
          <input name="email" type="email" autocomplete="username" value="{{ email or '' }}" required>
        </label>
        <label>
          <span>비밀번호</span>
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="login-button">개발용 로그인</button>
      </form>
    {% endif %}
  </section>
</div>
</body>
</html>
